<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>frisson</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      overflow: hidden;

      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.04), transparent 25%),
        radial-gradient(circle at top, #432033, #120810 72%);

      color: #fff8fb;
      font-family: 'Inter', sans-serif;
    }

    .card {
      width: 100%;
      max-width: 680px;

      padding: 56px 42px;

      text-align: center;

      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(14px);

      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 32px;

      box-shadow:
        0 0 60px rgba(255, 204, 230, 0.08),
        0 25px 80px rgba(0,0,0,0.45);

      animation: fadeUp 1.2s ease;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem;
      font-weight: 500;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-family: 'Inter', sans-serif;
      font-style: italic;
      opacity: 0.75;
      margin-bottom: 36px;
      font-size: 0.95rem;
    }

    .definition {
      max-width: 540px;
      margin: 0 auto;

      font-size: 1.08rem;
      line-height: 2;
      font-weight: 300;
    }

    .definition p {
      margin-bottom: 22px;
    }

    .mamdada {
      font-style: italic;
      opacity: 0.95;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: rgba(255,255,255,0.25);
      margin: 36px auto;
    }

    .playlist-button {
      display: inline-block;

      padding: 14px 38px;

      border-radius: 999px;

      text-decoration: none;

      background: #fff8fb;
      color: #341828;

      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 2px;
      text-transform: lowercase;

      transition: all 0.3s ease;
    }

    .playlist-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255,255,255,0.15);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 3.8rem;
      }

      .card {
        padding: 44px 28px;
      }

      .definition {
        font-size: 1rem;
        line-height: 1.9;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>frisson</h1>

    <p class="subtitle">noun • French</p>

    <div class="definition">

      <p>
        A sudden thrill or emotional shiver.
      </p>

      <p>
        Most commonly associated with music, but sometimes caused by a voice,
        a memory, a moment, a person, or a certain self-proclaimed
        <span class="mamdada">Mamdada</span>.
      </p>

      <p>
        From the French <em>frisson</em>, meaning “a shiver” or “a chill.”
      </p>

    </div>

    <div class="divider"></div>

    <a
      class="playlist-button"
      href="https://music.apple.com/us/playlist/fris-son/pl.u-LdbqE13Fxm88Jv4"
      target="_blank"
    >
      open
    </a>

  </div>

</body>
</html>
