<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frisson</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.04), transparent 25%),
        radial-gradient(circle at top, #432033, #120810 72%);
      color: #fff8fb;
      font-family: 'Inter', sans-serif;
    }

    .card {
      width: 100%;
      max-width: 700px;
      padding: 54px 38px;
      text-align: center;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 32px;
      box-shadow:
        0 0 60px rgba(255, 204, 230, 0.08),
        0 25px 80px rgba(0,0,0,0.45);
      animation: fadeUp 1.2s ease;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 5rem;
      font-weight: 500;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-style: italic;
      opacity: 0.75;
      margin-bottom: 34px;
      font-size: 0.95rem;
    }

    .definition {
      max-width: 560px;
      margin: 0 auto;
      font-size: 1.08rem;
      line-height: 2;
      font-weight: 300;
    }

    .definition p {
      margin-bottom: 22px;
    }

    .mamdada {
      font-style: italic;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: rgba(255,255,255,0.25);
      margin: 34px auto;
    }

    .note {
      min-height: 170px;
      max-width: 570px;
      margin: 0 auto 34px;
      font-size: 0.95rem;
      line-height: 1.9;
      opacity: 0.86;
      font-weight: 300;
      white-space: pre-line;
    }

    .note::after {
      content: "|";
      animation: blink 1s infinite;
      opacity: 0.75;
    }

    .note.done::after {
      content: "";
    }

    .playlist-button {
      display: inline-block;
      padding: 14px 38px;
      border-radius: 999px;
      text-decoration: none;
      background: #fff8fb;
      color: #341828;
      font-size: 0.95rem;
      letter-spacing: 2px;
      text-transform: lowercase;
      transition: all 0.3s ease;
    }

    .playlist-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255,255,255,0.15);
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 3.8rem;
      }

      .card {
        padding: 42px 26px;
      }

      .definition {
        font-size: 1rem;
        line-height: 1.85;
      }

      .note {
        font-size: 0.92rem;
        min-height: 210px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>frisson</h1>
    <p class="subtitle">noun • French</p>

    <div class="definition">
      <p>A sudden thrill or emotional shiver.</p>

      <p>
        Most commonly associated with music, but sometimes caused by a voice,
        a memory, a moment, a person, or a certain self-proclaimed
        <span class="mamdada">Mamdada</span>.
      </p>

      <p>
        From the French <em>frisson</em>, meaning “a shiver” or “a chill.”
      </p>
    </div>

    <div class="divider"></div>

    <p class="note" id="note"></p>

    <a
      class="playlist-button"
      href="https://music.apple.com/us/playlist/fris-son/pl.u-LdbqE13Fxm88Jv4"
      target="_blank"
    >
      open
    </a>
  </div>

  <script>
    const noteText = `Knowing how good your music taste already is, there's a good chance you'll know most of these.

I'll keep adding songs I think you'd enjoy, and songs that make me think of you.

Hopefully it adds a centimeter or two to your hand demonstration of how much you miss me. 🤏🏾`;

    const noteElement = document.getElementById("note");
    let index = 0;

    function typeWriter() {
      if (index < noteText.length) {
        noteElement.textContent += noteText[index];
        index++;
        setTimeout(typeWriter, 26);
      } else {
        noteElement.classList.add("done");
      }
    }

    setTimeout(typeWriter, 900);
  </script>
</body>
</html>
