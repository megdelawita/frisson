<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frisson</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 20%, rgba(255, 210, 230, 0.08), transparent 30%),
        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.035), transparent 28%),
        linear-gradient(180deg, #1b0d16, #090407);
      color: #fff8fb;
      font-family: 'Inter', sans-serif;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 900ms ease;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(5rem, 16vw, 10rem);
      font-weight: 400;
      letter-spacing: 2px;
      margin-bottom: 28px;
    }

    h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 9vw, 5rem);
      font-weight: 400;
      margin-bottom: 28px;
    }

    .subtitle {
      font-style: italic;
      opacity: 0.72;
      margin-bottom: 36px;
    }

    .text {
      max-width: 620px;
      font-size: clamp(1rem, 2.8vw, 1.15rem);
      line-height: 2;
      font-weight: 300;
    }

    .text p {
      margin-bottom: 22px;
    }

    .note {
      min-height: 240px;
      max-width: 620px;
      white-space: pre-line;
      font-size: clamp(1rem, 2.8vw, 1.12rem);
      line-height: 2;
      font-weight: 300;
      opacity: 0.9;
      margin-bottom: 36px;
    }

    .note::after {
      content: "|";
      animation: blink 1s infinite;
      opacity: 0.75;
    }

    .note.done::after {
      content: "";
    }

    button,
    a {
      background: none;
      border: none;
      color: #fff8fb;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 2px;
      text-transform: lowercase;
      text-decoration: none;
      cursor: pointer;
      opacity: 0.82;
      transition: opacity 300ms ease, transform 300ms ease;
    }

    button:hover,
    a:hover {
      opacity: 1;
      transform: translateY(-2px);
    }

    .soft-button {
      margin-top: 12px;
      border-bottom: 1px solid rgba(255, 248, 251, 0.55);
      padding-bottom: 6px;
    }

    .hidden-button {
      opacity: 0;
      pointer-events: none;
      transition: opacity 800ms ease, transform 300ms ease;
    }

    .hidden-button.show {
      opacity: 0.82;
      pointer-events: auto;
    }

    .mamdada {
      font-style: italic;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>

  <section class="screen active" id="screen1">
    <h1>frisson</h1>
    <button class="soft-button" onclick="showScreen('screen2')">enter</button>
  </section>

  <section class="screen" id="screen2">
    <h2>read first</h2>

    <p class="note" id="note"></p>

    <button class="soft-button hidden-button" id="continueBtn" onclick="showScreen('screen3')">
      continue
    </button>
  </section>

  <section class="screen" id="screen3">
    <h2>frisson</h2>
    <p class="subtitle">noun • French</p>

    <div class="text">
      <p>A sudden thrill or emotional shiver.</p>

      <p>
        Most commonly associated with music, but sometimes caused by a voice,
        a memory, a moment, a person, or a certain self-proclaimed
        <span class="mamdada">Mamdada</span>.
      </p>

      <p>
        From the French <em>frisson</em>, meaning “a shiver” or “a chill.”
      </p>
    </div>

    <a
      class="soft-button"
      href="https://music.apple.com/us/playlist/fris-son/pl.u-LdbqE13Fxm88Jv4"
      target="_blank"
    >
      open
    </a>
  </section>

  <script>
    const noteText = `Knowing how good your music taste already is, there's a good chance you'll know most of these.

I'll keep adding songs I think you'd enjoy, and songs that make me think of you.

Hopefully it adds a centimeter or two to your hand demonstration of how much you miss me. 🤏🏾`;

    const noteElement = document.getElementById("note");
    const continueBtn = document.getElementById("continueBtn");
    let typed = false;

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(screen => {
        screen.classList.remove("active");
      });

      document.getElementById(id).classList.add("active");

      if (id === "screen2" && !typed) {
        typed = true;
        setTimeout(typeWriter, 500);
      }
    }

    let index = 0;

    function typeWriter() {
      if (index < noteText.length) {
        noteElement.textContent += noteText[index];
        index++;
        setTimeout(typeWriter, 24);
      } else {
        noteElement.classList.add("done");
        continueBtn.classList.add("show");
      }
    }
  </script>

</body>
</html>
